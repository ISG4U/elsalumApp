name: elsalum_app
description: "A new Flutter project for Al-Saloum & Al-Ghaith Dates Marketing."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  connectivity_plus: ^6.1.3
  url_launcher: ^6.3.1
  flutter_inappwebview: ^6.1.5
  flutter_native_splash: ^2.4.5
  onesignal_flutter: ^5.3.0
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo no enhance.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_adaptive_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
